<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kevin Kataria — Stock Intelligence</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1220;
  color: white;
}

/* REMOVE ANY AFTER CURSOR BUG */
*::after {
  content: none !important;
}

/* NAV */
.nav {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 20px;
}

.nav button {
  padding: 10px 18px;
  border-radius: 20px;
  border: 1px solid #2a2f45;
  background: transparent;
  color: white;
  cursor: pointer;
}

/* HERO */
.hero {
  max-width: 900px;
  margin: auto;
  padding: 30px;
}

.hero h1 {
  font-size: 36px;
  margin-bottom: 10px;
}

.hero p {
  color: #9ca3af;
}

/* SEARCH */
.search-box {
  margin-top: 20px;
  position: relative;
}

.search-box input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
}

.search-box button {
  position: absolute;
  right: 5px;
  top: 5px;
  bottom: 5px;
  padding: 0 20px;
  border-radius: 10px;
  border: none;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

/* SUGGESTIONS */
.suggestions {
  position: absolute;
  background: #111827;
  width: 100%;
  top: 50px;
  border-radius: 10px;
  display: none;
  max-height: 250px;
  overflow-y: auto;
  z-index: 999;
}

.suggestion {
  padding: 10px;
  cursor: pointer;
}

.suggestion:hover {
  background: #1f2937;
}

/* CARD */
.card {
  background: #111827;
  margin: 20px auto;
  padding: 20px;
  border-radius: 12px;
  max-width: 900px;
}
</style>
</head>

<body>

<div class="nav">
  <button>Home</button>
  <button>Portfolio</button>
  <button>Screener</button>
  <button>Alerts</button>
</div>

<div class="hero">
  <h1>Search any NSE stock</h1>
  <p>Modern UI with autocomplete and analysis</p>

  <div class="search-box">
    <input id="search" placeholder="Type stock name..." />
    <button onclick="searchStock()">Analyse</button>

    <div id="suggestions" class="suggestions"></div>
  </div>
</div>

<div class="card">
  <h2 id="selected">No stock selected</h2>
  <p id="result">Start searching...</p>
</div>

<script>
let selectedSymbol = null;

/* FETCH SUGGESTIONS */
document.getElementById("search").addEventListener("input", async (e) => {
  const q = e.target.value;

  if (!q) {
    document.getElementById("suggestions").style.display = "none";
    return;
  }

  const res = await fetch(`/api/search?q=${q}`);
  const data = await res.json();

  const box = document.getElementById("suggestions");

  if (!data.results || data.results.length === 0) {
    box.style.display = "none";
    return;
  }

  box.innerHTML = data.results.map(s => `
    <div class="suggestion" onclick="selectStock('${s.symbol}')">
      <b>${s.symbol}</b> - ${s.name}
    </div>
  `).join("");

  box.style.display = "block";
});

/* SELECT */
function selectStock(symbol) {
  selectedSymbol = symbol;
  document.getElementById("search").value = symbol;
  document.getElementById("suggestions").style.display = "none";
}

/* ANALYSE */
async function searchStock() {
  let symbol = selectedSymbol || document.getElementById("search").value;

  if (!symbol) return;

  document.getElementById("selected").innerText = symbol;

  try {
    const res = await fetch(`/api/price/${symbol}`);
    const data = await res.json();

    if (!data.success) {
      document.getElementById("result").innerText = "No stock found";
      return;
    }

    document.getElementById("result").innerText =
      "Price: " + (data.price || "N/A");

  } catch (e) {
    document.getElementById("result").innerText = "Error loading data";
  }
}
</script>

</body>
</html>
