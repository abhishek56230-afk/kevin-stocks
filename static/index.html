<!DOCTYPE html>
<html>
<head>
  <title>Stock Intelligence</title>
</head>

<body>

<div style="position: relative; width: 400px; margin: 100px auto;">

  <input 
    id="stockSearch"
    placeholder="Type AD, HCL, REL... and get matching NSE stocks"
    style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc;"
  />

  <div 
    id="stockSearchDropdown"
    style="
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
      background: rgba(20, 25, 35, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 10px;
      margin-top: 8px;
      z-index: 9999;
      display: none;
      max-height: 300px;
      overflow-y: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      color: white;
    "
  ></div>

</div>

<script src="patched_stock_search.js"></script>

</body>
</html>
