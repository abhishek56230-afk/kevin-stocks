<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kevin Kataria — Stock Intelligence Pro</title>
  <meta name="description" content="Professional NSE stock analysis with AI copilot, live prices, order book, and deep research." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* Add all your existing CSS styles exactly as they were here */
    :root { --bg: #060d1a; --panel: #0c1628; --line: rgba(255,255,255,.07); --line-2: rgba(255,255,255,.12); --text: #e8f0ff; --text-2: #b8c8e8; --muted: #5a7090; --brand: #38bdf8; --teal: #2dd4bf; --green: #10b981; --red: #f87171; --amber: #fbbf24; --radius-sm:10px; --radius:16px; --radius-lg:22px; --shadow: 0 20px 60px rgba(0,0,0,.4); --shadow-sm:0 4px 16px rgba(0,0,0,.25); }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', system-ui, sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }
    body { background-image: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(56,189,248,.08) 0%, transparent 60%), radial-gradient(ellipse 40% 40% at 80% 10%, rgba(45,212,191,.05) 0%, transparent 50%); }
    .loader { padding: 36px; text-align: center; color: var(--muted); font-size: 14px; }
    .loader::before { content: ''; display: block; width: 28px; height: 28px; margin: 0 auto 12px; border: 2px solid rgba(56,189,248,.15); border-top-color: var(--brand); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* ... Copy remaining CSS from your original file ... */
  </style>
</head>
<body>
<div class="shell">
    <h1 style="margin:20px; text-align: center; color: var(--brand);">Stock Intelligence Active</h1>
    <div id="view-screener" class="view">
        <div class="card panel">
            <div class="panel-head">
                <div><h2>Screener</h2><div class="sub">Filter NSE stocks by fundamentals. Leave blank to skip any filter.</div></div>
                <div style="display:flex;gap:8px">
                    <button class="ghost" id="resetScreenerBtn">Reset</button>
                    <button class="primary-btn" id="runScreenerBtn">Run Screener</button>
                </div>
            </div>
            <div id="screenerList" class="tableish" style="margin-top:18px"></div>
        </div>
    </div>
</div>

<script>
/* ─── State ─── */
const state = { searchTimer: null, searchResults: [], activeSuggestion: -1, selectedSymbol: null, analysisCache: {}, searchCache: new Map(), searchAbort: null, lastSearch: '', chatHistory: [], copilotSymbol: null };
const qs  = s => document.querySelector(s);
const qsa = s => Array.from(document.querySelectorAll(s));
const money  = v => v == null || v === '' ? '—' : '₹' + Number(v).toLocaleString('en-IN', { maximumFractionDigits: 2 });

async function api(path, opts) {
  const r = await fetch(path, opts);
  let d;
  try {
    const text = await r.text();
    if (!text || !text.trim()) throw new Error('Empty response. Try again.');
    d = JSON.parse(text);
  } catch(e) {
    throw new Error('Server error — ' + (e.message || 'unexpected response'));
  }
  if (!r.ok) throw new Error(d.error || 'Request failed');
  if (d && d.success === false) throw new Error(d.error || 'No data returned');
  return d;
}

/* ─── Screener ─── */
function scrVal(id) { var el = qs('#'+id); return el && el.value.trim() ? el.value.trim() : null; }

async function runScreener() {
  const list = qs('#screenerList');
  if(!list) return;
  list.innerHTML = '<div class="loader"></div><div style="text-align:center;color:var(--muted);font-size:12px;padding-bottom:16px">Running screener securely...</div>';
  try {
    const params = new URLSearchParams();
    [['min_pe','minPe'],['max_pe','maxPe'],['max_peg','maxPeg'],['min_roe','minRoe'],['max_debt','maxDebt'],['min_mcap','minMcap'],['max_mcap','maxMcap'],['min_promoter','minPromoter'],['max_promoter','maxPromoter'],['min_fii','minFii'],['max_fii','maxFii'],['min_dii','minDii'],['max_dii','maxDii'],['min_public','minPublic'],['max_public','maxPublic']].forEach(f => { 
        var v = scrVal(f[1]); 
        if(v) params.set(f[0], v); 
    });
    
    const data = await api('/api/screener?' + params.toString());
    const stocks = data.stocks || [];
    const meta = `<div style="padding:10px 16px 0;font-size:12px;color:var(--muted)">Scanned ${data.scanned||0} stocks · ${stocks.length} matched</div>`;
    
    if (!stocks.length) {
      list.innerHTML = meta + '<div style="padding:20px 16px;color:var(--muted);font-size:13px">No stocks matched those filters.</div>';
      return;
    }
    
    const mcapFmt = cr => { if(!cr&&cr!==0) return '—'; if(cr>=100000) return (cr/100000).toFixed(1)+' L Cr'; if(cr>=1000) return (cr/1000).toFixed(1)+' K Cr'; return cr.toFixed(0)+' Cr'; };
    const fmt = (v,s='') => (v == null || v === '' || v === 'N/A') ? '—' : v + s;

    list.innerHTML =
      meta +
      '<div class="scr-table-head" style="display: grid; grid-template-columns: 100px 80px 60px 60px 60px 60px 80px 80px 60px 60px 60px; font-size:11px; padding:8px"><div>Symbol</div><div>Price</div><div>P/E</div><div>PEG</div><div>ROE</div><div>D/E</div><div>MCap</div><div>Promoter</div><div>FII</div><div>DII</div><div>Public</div></div>' +
      stocks.map(s =>
        `<div class="scr-table-row" style="display: grid; grid-template-columns: 100px 80px 60px 60px 60px 60px 80px 80px 60px 60px 60px; padding: 8px;">
          <div><strong>${s.symbol}</strong></div>
          <div>${money(s.price)}</div>
          <div>${fmt(s.pe)}</div>
          <div>${fmt(s.peg)}</div>
          <div>${fmt(s.roe,'%')}</div>
          <div>${fmt(s.debt_equity)}</div>
          <div>${mcapFmt(s.mcap_cr)}</div>
          <div>${fmt(s.promoter,'%')}</div>
          <div>${fmt(s.fii,'%')}</div>
          <div>${fmt(s.dii,'%')}</div>
          <div>${fmt(s.public,'%')}</div>
        </div>`
      ).join('');
  } catch(e) {
    list.innerHTML = '<div class="analysis-empty"><strong>Screener failed</strong><br>' + (e.message || 'Unexpected error') + '</div>';
  }
}

// Ensure event listener triggers correctly
const screenerBtn = qs('#runScreenerBtn');
if (screenerBtn) screenerBtn.addEventListener('click', runScreener);

/* Paste all your other JS functions (openStock, aiChat, loadWatchlist) here identically */
</script>
</body>
</html>
